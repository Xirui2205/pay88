  /v1/checkout/{tx_ref}:
    get:
      tags: [Hosted]
      operationId: getHostedCheckout
      summary: Read a scoped customer checkout
      description: |
        Public browser endpoint protected by the opaque scoped token contained in
        `checkout_url`. The response includes the assigned full Telebirr number.
        Treat the URL and token as sensitive and do not log them.
      security: []
      parameters:
        - $ref: '#/components/parameters/TransactionReference'
        - $ref: '#/components/parameters/ScopedToken'
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: Hosted checkout state
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostedDepositEnvelope'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/hosted/transfers/{reference}:
    get:
      tags: [Hosted]
      operationId: getHostedTransferStatus
      summary: Read scoped hosted transfer status
      description: Public browser endpoint protected by the opaque token returned in `status_url` and `status_api_url`.
      security: []
      parameters:
        - $ref: '#/components/parameters/TransferReference'
        - $ref: '#/components/parameters/ScopedToken'
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          $ref: '#/components/responses/HostedTransferResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/hosted/transfers/{reference}/events:
    get:
      tags: [Hosted]
      operationId: streamHostedTransferStatus
      summary: Stream scoped hosted transfer status
      description: |
        Server-Sent Events stream for browser progress UI. Authenticate with the
        same opaque query token used by `status_api_url`; no merchant key is
        accepted or required. The server polls every two seconds, emits only
        changed states as `transfer.status`, includes the terminal event, and
        then closes. Event `data` is a hosted transfer object, not the standard
        API envelope.
      security: []
      parameters:
        - $ref: '#/components/parameters/TransferReference'
        - $ref: '#/components/parameters/ScopedToken'
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: Server-Sent Events stream
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                event: transfer.status
                data: {"reference":"withdrawal-20260710-001","status":"pending","p2p_status":"provider_pending","eta_seconds":12,"merchant_name":"Example Merchant"}

        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
webhooks:
  merchantEvent:
    post:
      operationId: receiveMerchantWebhook
      summary: Gateway event delivered to a registered merchant URL
      description: |
        Deliveries are at least once and may be out of order. Compute HMAC-SHA256
        over `X-P2P-Timestamp + "." + exact_raw_body`, compare with the lowercase
        hexadecimal value after `v1=` in `X-P2P-Signature`, reject stale
        timestamps, and deduplicate `event_id`. Failed deliveries retry with
        exponential backoff for up to 24 hours and can then be manually replayed.
      security: []
      parameters:
        - $ref: '#/components/parameters/WebhookTimestamp'
        - $ref: '#/components/parameters/WebhookSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookEvent'
      responses:
        '200':
          description: Acknowledge quickly after validation and durable enqueue
        '400':
          description: Invalid body or stale timestamp
        '401':
          description: Invalid signature
components:
  securitySchemes:
    merchantSecretKey:
      type: http
      scheme: bearer
      bearerFormat: sk_test_prefix.secret or sk_live_prefix.secret
      description: Separate server-side test and live keys; never expose in browser code.
    portalSession:
      type: http
      scheme: bearer
      bearerFormat: mps_opaque_session
      description: Individual merchant-portal session; never substitute a merchant secret API key.
    platformSession:
      type: http
      scheme: bearer
      bearerFormat: pas_opaque_session
      description: >-
        Individual platform-staff session. Controlled service automation may use
        the separately audited break-glass credential described in the operator
        runbook; it is not a human session.
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        8-255 character operation key. Financial creates fall back to `tx_ref`
        or `reference`; sweep-rule creation falls back to `name`; rule writes
        and webhook delivery replay fall back to the resource ID; webhook
        registration derives a stable key from the URL. Identical replays return
        the original result and changed payloads return 409.
      schema:
        type: string
        minLength: 8
        maxLength: 255
      example: merchant-order-20260710-001
    RequestId:
      name: X-Request-Id
      in: header
      required: false
      description: Optional caller trace ID. Invalid values are replaced by a generated UUID.
      schema:
        type: string
        pattern: '^[A-Za-z0-9._:-]{1,128}$'
    TransactionReference:
      name: tx_ref
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Reference'
    TransferReference:
      name: reference
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Reference'
    SettlementReference:
      name: reference
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Reference'
    SweepRuleId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SupportCaseId:
      name: caseId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SupportEnvironment:
      name: environment
      in: query
      required: false
      schema:
        type: string
        enum: [test, live]
    SupportStatusQuery:
      name: status
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/SupportCaseStatus'
    SupportLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 100
    ScopedToken:
      name: token
      in: query
      required: true
      description: Opaque, signed, resource-scoped browser token.
      schema:
        type: string
        minLength: 16
    WebhookTimestamp:
      name: X-P2P-Timestamp
      in: header
      required: true
      description: Unix epoch seconds used in the signed payload.
      schema:
        type: string
        pattern: '^\d{10,}$'
      example: '1783656000'
    WebhookSignature:
      name: X-P2P-Signature
      in: header
      required: true
      description: "v1= followed by lowercase hexadecimal HMAC-SHA256."
      schema:
        type: string
        pattern: '^v1=[a-f0-9]{64}$'
      example: v1=6f1c97a56f98445e2e9d449ad070c76d704845d6b9b30a2e23f0073346518ce8
  headers:
    RequestId:
      description: Request correlation identifier.
      schema:
        type: string
  responses:
    DepositResponse:
      description: Deposit or top-up intent
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DepositEnvelope'
    TransferResponse:
      description: Transfer state
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TransferEnvelope'
    HostedTransferResponse:
      description: Scoped hosted transfer state, including the merchant display name
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HostedTransferEnvelope'
    SettlementResponse:
      description: Merchant settlement request state
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SettlementEnvelope'
    SettlementListResponse:
      description: Merchant settlement request list
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SettlementListEnvelope'
    SweepRuleResponse:
      description: Merchant sweep rule state
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SweepRuleEnvelope'
    SweepRuleListResponse:
      description: Merchant sweep rule list
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SweepRuleListEnvelope'
    SupportCaseResponse:
      description: Tenant-scoped support case state and, on detail or mutation responses, its message history
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SupportCaseEnvelope'
    SupportCaseListResponse:
      description: Support case list; platform responses may include merchant identity
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SupportCaseListEnvelope'
    BadRequest:
      description: Invalid request syntax or schema
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            status: error
            message: The request payload is invalid
            code: validation_error
            data:
              fieldErrors:
                amount: [amount must be a positive decimal string with two digits]
            request_id: 0b5fa7d4-a04d-4e7c-9b89-d8a0593d06b5
    Unauthorized:
      description: Missing, malformed, invalid, expired, or revoked bearer credential
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            status: error
            message: A valid bearer credential is required
            code: unauthorized
            data: null
            request_id: 0b5fa7d4-a04d-4e7c-9b89-d8a0593d06b5
    Forbidden:
      description: Token or environment is not authorized for this operation
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Reference or resource not found
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Duplicate reference conflict, active intent, or invalid state
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            changedPayload:
              value:
                status: error
                message: The idempotency key was already used with a different payload
                code: duplicate_reference_conflict
                data: null
                request_id: 0b5fa7d4-a04d-4e7c-9b89-d8a0593d06b5
            activeIntent:
              value:
                status: error
                message: Customer already has an active deposit
                code: active_intent_exists
                data:
                  tx_ref: existing-deposit-001
                request_id: 0b5fa7d4-a04d-4e7c-9b89-d8a0593d06b5
    Unprocessable:
      description: Semantically invalid amount or merchant configuration constraint
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    RateLimited:
      description: Request admission limit exceeded
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    InternalError:
      description: Unexpected server error
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ServiceUnavailable:
      description: No eligible physical Telebirr liquidity is currently available
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            status: error
            message: No eligible wallet can fund this transfer
            code: no_physical_liquidity
            data: null
            request_id: 0b5fa7d4-a04d-4e7c-9b89-d8a0593d06b5
  schemas:
    Reference:
      type: string
      minLength: 1
      maxLength: 128
      pattern: '^[A-Za-z0-9._:-]+$'
    EtbAmount:
      type: string
      pattern: '^(0|[1-9]\d*)\.\d{2}$'
      not:
        const: '0.00'
      description: Positive ETB decimal string with exactly two fractional digits.
      examples: ['500.00']
    EtbValue:
      type: string
      pattern: '^(0|[1-9]\d*)\.\d{2}$'
      description: Non-negative ETB decimal string with exactly two fractional digits.
      examples: ['0.00', '500.00']
    EtbSignedValue:
      type: string
      pattern: '^-?(0|[1-9]\d*)\.\d{2}$'
      description: Signed ETB ledger value with exactly two fractional digits.
      examples: ['500.00', '-1.25']
    EthiopianPhoneInput:
      type: string
      description: Ethiopian mobile number; accepted forms include 0912345678, 912345678, 251912345678, and +251912345678.
      examples: ['0912345678']
    Metadata:
      type: object
      additionalProperties: true
      description: Merchant-defined JSON object returned as contextual data where supported.
    Customization:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
          maxLength: 120
        description:
          type: string
          maxLength: 500
        logo:
          type: string
          format: uri
          pattern: '^https?://'
    InitializeTransactionRequest:
      type: object
      additionalProperties: false
      required: [amount, tx_ref, customer_id, first_name, phone_number]
      properties:
        amount:
          $ref: '#/components/schemas/EtbAmount'
        currency:
          type: string
          const: ETB
          default: ETB
        tx_ref:
          $ref: '#/components/schemas/Reference'
        customer_id:
          type: string
          minLength: 1
          maxLength: 128
        first_name:
          type: string
          minLength: 1
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 254
        phone_number:
          $ref: '#/components/schemas/EthiopianPhoneInput'
        callback_url:
          type: string
          format: uri
          pattern: '^https?://'
          description: Compatibility/advisory field. V1 does not guarantee direct delivery to this URL; registered signed webhooks and verify are authoritative.
        return_url:
          type: string
          format: uri
          pattern: '^https?://'
          description: Browser navigation only; never proof of payment.
        customization:
          $ref: '#/components/schemas/Customization'
        metadata:
          $ref: '#/components/schemas/Metadata'
        test_scenario:
          type: string
          enum: [success, wrong_amount, late, duplicate, ambiguous]
          description: Accepted only as simulator input with a test key.
    CreateTransferRequest:
      type: object
      additionalProperties: false
      required: [account_number, expected_name, customer_id, amount, reference, bank_code]
      properties:
        account_number:
          $ref: '#/components/schemas/EthiopianPhoneInput'
        expected_name:
          type: string
          minLength: 2
          maxLength: 200
        customer_id:
          type: string
          minLength: 1
          maxLength: 128
        destination_type:
          type: string
          enum: [registered, alternate]
          default: registered
          description: >-
            `registered` is the default merchant assertion. `alternate` requires
            a platform-approved merchant setting; otherwise the API returns 403
            `alternate_destination_disabled`.
        amount:
          $ref: '#/components/schemas/EtbAmount'
        currency:
          type: string
          const: ETB
          default: ETB
        reference:
          $ref: '#/components/schemas/Reference'
        bank_code:
          oneOf:
            - type: string
              const: '855'
            - type: integer
              const: 855
        callback_url:
          type: string
          format: uri
          pattern: '^https?://'
          description: Compatibility/advisory field. V1 does not guarantee direct delivery to this URL; registered signed webhooks and verify are authoritative.
        metadata:
          $ref: '#/components/schemas/Metadata'
        test_scenario:
          type: string
          enum: [success, explicit_failure, delay, unknown]
          description: Accepted only as simulator input with a test key.
    CreateSettlementRequest:
      type: object
      additionalProperties: false
      required: [reference, account_number, expected_name, amount]
      properties:
        reference:
          $ref: '#/components/schemas/Reference'
        account_number:
          $ref: '#/components/schemas/EthiopianPhoneInput'
        expected_name:
          type: string
          minLength: 2
          maxLength: 200
        amount:
          $ref: '#/components/schemas/EtbAmount'
        currency:
          type: string
          const: ETB
          default: ETB
        metadata:
          $ref: '#/components/schemas/Metadata'
    TestTransferCompletionRequest:
      type: object
      additionalProperties: false
      required: [outcome]
      properties:
        outcome:
          type: string
          enum: [success, failed, unknown]
    SweepRuleRequest:
      type: object
      additionalProperties: false
      required:
        - group_id
        - name
        - destination_type
        - destination_phone
        - destination_name
        - high_water_balance
        - target_balance
        - max_per_run
      properties:
        group_id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 2
          maxLength: 120
        destination_type:
          type: string
          enum: [platform_treasury, merchant_owned]
        destination_phone:
          $ref: '#/components/schemas/EthiopianPhoneInput'
        destination_name:
          type: string
          minLength: 2
          maxLength: 200
