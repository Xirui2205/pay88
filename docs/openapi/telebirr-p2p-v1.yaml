openapi: 3.1.0
info:
  title: Telebirr P2P Gateway API
  version: 1.0.0
  summary: Multi-merchant ETB deposit and Telebirr payout API
  description: |
    Server-to-server API for ETB deposits, merchant liquidity top-ups, Telebirr
    transfers, merchant settlement requests, approved liquidity-sweep rules,
    merchant balances, and signed webhook administration.

    Money is always represented as a positive decimal string with exactly two
    fractional digits. Test and live keys address isolated environments. Browser
    redirects are never proof of payment; verify server-side or consume a signed
    webhook.

    This contract covers merchant secret-key and scoped hosted-browser routes,
    plus the merchant/platform support-case exchange. Other human portal and
    platform-administration routes use separate session/reauthentication
    controls documented in the portal access manuals.
  contact:
    name: Telebirr P2P Gateway support
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: '{scheme}://{gatewayHost}'
    description: Set these variables to the assigned test or live gateway origin.
    variables:
      scheme:
        default: https
        enum: [https, http]
        description: Use http only for local development.
      gatewayHost:
        default: gateway.your-domain.tld
        description: For local development use localhost:3000.
tags:
  - name: Deposits
    description: Customer payment intents and server-side verification.
  - name: Top-ups
    description: Merchant physical-liquidity funding intents.
  - name: Transfers
    description: Telebirr payouts and provider discovery.
  - name: Settlements
    description: Merchant-requested Telebirr settlements requiring platform approval.
  - name: Sweep rules
    description: Merchant-managed high-water liquidity rules requiring platform approval.
  - name: Merchant
    description: Merchant-level aggregate balances and indicators.
  - name: Webhooks
    description: Signed webhook endpoint administration and replay.
  - name: Test simulator
    description: Deterministic test-key-only scenario controls; never available in live mode.
  - name: Merchant support
    description: Merchant portal communication, evidence and advisory match proposals.
  - name: Platform support
    description: Platform staff support workflow; status changes never perform financial resolution.
  - name: Hosted
    description: Public browser resources protected by scoped opaque tokens.
security:
  - merchantSecretKey: []
paths:
  /v1/transaction/initialize:
    post:
      tags: [Deposits]
      operationId: initializeTransaction
      summary: Initialize a customer deposit
      description: |
        Creates one active deposit intent for a merchant customer and returns a
        scoped hosted checkout URL. With a test key, `test_scenario` controls the
        deterministic simulator. If `Idempotency-Key` is omitted, `tx_ref` is used.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitializeTransactionRequest'
            examples:
              customerDeposit:
                value:
                  amount: '500.00'
                  currency: ETB
                  tx_ref: deposit-20260710-001
                  customer_id: player-42
                  first_name: Abebe
                  last_name: Kebede
                  email: abebe@example.com
                  phone_number: '0912345678'
                  callback_url: https://merchant.example/callback
                  return_url: https://merchant.example/deposit/return
                  customization:
                    title: Wallet deposit
                    description: Fund your account with Telebirr
                    logo: https://merchant.example/logo.png
                  metadata:
                    account_id: wallet-42
                  test_scenario: success
      responses:
        '200':
          $ref: '#/components/responses/DepositResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/transaction/verify/{tx_ref}:
    get:
      tags: [Deposits]
      operationId: verifyTransaction
      summary: Verify a deposit or merchant top-up
      description: Returns every existing intent, including pending and expired intents. Only an unknown reference returns 404.
      parameters:
        - $ref: '#/components/parameters/TransactionReference'
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          $ref: '#/components/responses/DepositResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/topups/initialize:
    post:
      tags: [Top-ups]
      operationId: initializeMerchantTopup
      summary: Initialize a merchant liquidity top-up
      description: |
        Uses the deposit matching flow but credits merchant liquidity. Verify the
        returned `tx_ref` with the transaction verification endpoint. If
        `Idempotency-Key` is omitted, `tx_ref` is used.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitializeTransactionRequest'
            example:
              amount: '10000.00'
              currency: ETB
              tx_ref: topup-20260710-001
              customer_id: treasury-operator-7
              first_name: Merchant
              last_name: Treasury
              phone_number: '+251911234567'
              metadata:
                internal_batch: LIQ-001
              test_scenario: success
      responses:
        '200':
          $ref: '#/components/responses/DepositResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/settlements:
    post:
      tags: [Settlements]
      operationId: requestMerchantSettlement
      summary: Request a merchant Telebirr settlement
      description: |
        Creates a settlement request for platform review. Creation does not move
        money. After approval the gateway reserves merchant and physical
        liquidity and dispatches one Telebirr transfer. If `Idempotency-Key` is
        omitted, `reference` is used.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSettlementRequest'
            example:
              reference: settlement-20260710-001
              account_number: '0912345678'
              expected_name: Merchant Treasury
              amount: '25000.00'
              currency: ETB
              metadata:
                requested_by: finance-team
      responses:
        '200':
          $ref: '#/components/responses/SettlementResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      tags: [Settlements]
      operationId: listMerchantSettlements
      summary: List merchant settlement requests
      description: Returns up to the 200 most recent requests for the authenticated merchant and environment.
      parameters:
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          $ref: '#/components/responses/SettlementListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/settlements/{reference}:
    get:
      tags: [Settlements]
      operationId: getMerchantSettlement
      summary: Get a merchant settlement request
      parameters:
        - $ref: '#/components/parameters/SettlementReference'
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          $ref: '#/components/responses/SettlementResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/sweep-rules:
    post:
      tags: [Sweep rules]
      operationId: createSweepRule
      summary: Propose a high-water sweep rule
      description: |
        Creates a pending rule. Platform approval is required before automatic
        execution. `group_id` is supplied by platform onboarding. If
        `Idempotency-Key` is omitted, `name` is used.

        An approved `merchant_owned` destination exits platform custody and
        debits merchant principal and fees. An approved `platform_treasury`
        destination must match an active preapproved treasury wallet. It is an
        internal custody move: only the provider fee is charged to the merchant,
        while the principal is reclassified from fleet Telebirr custody to
        treasury custody and added to the treasury wallet's predicted balance.
        Automatic execution is live-environment only.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SweepRuleRequest'
            example:
              group_id: 11111111-1111-4111-8111-111111111111
              name: Addis collection high-water
              destination_type: merchant_owned
              destination_phone: '0912345678'
              destination_name: Merchant Jumbo Account
              high_water_balance: '75000.00'
              target_balance: '50000.00'
              max_per_run: '25000.00'
              minimum_interval_seconds: 900
      responses:
        '200':
          $ref: '#/components/responses/SweepRuleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      tags: [Sweep rules]
      operationId: listSweepRules
      summary: List merchant sweep rules
      parameters:
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          $ref: '#/components/responses/SweepRuleListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/sweep-rules/{id}:
    get:
      tags: [Sweep rules]
      operationId: getSweepRule
      summary: Get a merchant sweep rule
      parameters:
        - $ref: '#/components/parameters/SweepRuleId'
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          $ref: '#/components/responses/SweepRuleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags: [Sweep rules]
      operationId: replaceSweepRule
      summary: Replace and resubmit a sweep rule
      description: |
        Replaces all configurable fields, increments the version and resets the
        rule to `pending`. Platform reapproval is required. If the header is
        omitted, the rule ID is the idempotency key; use a new explicit key for
        each intentional later replacement.
      parameters:
        - $ref: '#/components/parameters/SweepRuleId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SweepRuleRequest'
      responses:
        '200':
          $ref: '#/components/responses/SweepRuleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [Sweep rules]
      operationId: disableSweepRule
      summary: Disable a sweep rule
      description: Disables future executions. Already committed transfers are not cancelled.
      parameters:
        - $ref: '#/components/parameters/SweepRuleId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReasonRequest'
            example:
              reason: Treasury account rotation
      responses:
        '200':
          $ref: '#/components/responses/SweepRuleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/transfers:
    post:
      tags: [Transfers]
      operationId: createTransfer
      summary: Create a Telebirr transfer
      description: |
        Reserves merchant ledger funds and physical fleet liquidity, then assigns
        exactly one SIM. `bank_code` accepts numeric `855` or string `"855"`.
        If `Idempotency-Key` is omitted, `reference` is used. A pending or unknown
        response is not permission to create a replacement transfer.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransferRequest'
            examples:
              numericBankCode:
                value:
                  account_number: '0912345678'
                  expected_name: Abebe Kebede
                  customer_id: player-42
                  destination_type: registered
                  amount: '500.00'
                  currency: ETB
                  reference: withdrawal-20260710-001
                  bank_code: 855
                  callback_url: https://merchant.example/callback
                  metadata:
                    account_id: wallet-42
                  test_scenario: success
              stringBankCode:
                value:
                  account_number: '+251912345678'
                  expected_name: Abebe Kebede
                  customer_id: player-42
                  amount: '500.00'
                  reference: withdrawal-20260710-002
                  bank_code: '855'
      responses:
        '200':
          $ref: '#/components/responses/TransferResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /v1/transfers/verify/{reference}:
    get:
      tags: [Transfers]
      operationId: verifyTransfer
      summary: Verify a Telebirr transfer
      parameters:
        - $ref: '#/components/parameters/TransferReference'
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          $ref: '#/components/responses/TransferResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/banks:
    get:
      tags: [Transfers]
      operationId: listBanks
      summary: List V1 payout providers
      description: Returns Telebirr as the only V1 provider.
      parameters:
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: Provider list
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BanksEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/balances:
    get:
      tags: [Merchant]
      operationId: getMerchantBalances
      summary: Get merchant ledger and aggregate liquidity balances
      description: Never exposes individual phone or SIM balances.
      parameters:
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: Merchant balance summary
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalancesEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/webhooks:
    get:
      tags: [Webhooks]
      operationId: listWebhookEndpoints
      summary: List registered webhook endpoints
      parameters:
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: Webhook endpoint list; secrets are never returned
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEndpointListEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Webhooks]
      operationId: registerWebhookEndpoint
      summary: Register a webhook endpoint
      description: |
        The signing secret is returned by the successful registration response,
        including an exact idempotent replay of that registration. Endpoint
        listings never return it. Production endpoints must use HTTPS. URL
        credentials, fragments, non-public DNS answers and redirects are not
        accepted; every delivery attempt revalidates DNS and pins the socket to
        the validated public address.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
                  maxLength: 2000
                  description: HTTPS is mandatory in production. Credentials, fragments, and hostnames resolving to private or reserved IPv4/IPv6 addresses are rejected. Redirects are never followed.
                  example: https://merchant.example/webhooks/telebirr
      responses:
        '200':
          description: Endpoint registered; persist `data.secret` before discarding the response
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookRegistrationEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/webhooks/{endpointId}:
    patch:
      tags: [Webhooks]
      operationId: setWebhookEndpointState
      summary: Enable or disable a webhook endpoint
      description: Disabling an endpoint dead-letters its pending deliveries; it does not delete delivery evidence.
      parameters:
        - name: endpointId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [enabled]
              properties:
                enabled:
                  type: boolean
      responses:
        '200':
          description: Endpoint state updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEndpointStateEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/webhooks/{endpointId}/rotate-secret:
    post:
      tags: [Webhooks]
      operationId: rotateWebhookEndpointSecret
      summary: Rotate a webhook signing secret
      description: |
        `Idempotency-Key` is mandatory. An exact retry returns the original
        one-time secret; a different endpoint with the same key returns 409.
        Store the returned secret immediately and update the receiver.
      parameters:
        - name: endpointId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            minLength: 8
            maxLength: 255
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: Secret rotated; persist `data.secret` before discarding the response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookSecretRotationEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/webhooks/deliveries/{deliveryId}/replay:
    post:
      tags: [Webhooks]
      operationId: replayWebhookDelivery
      summary: Queue replay of a webhook delivery
      parameters:
        - name: deliveryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: Replay accepted
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/test/scenarios/transfers/{reference}/complete:
    post:
      tags: [Test simulator]
      operationId: completeDelayedTestTransfer
      summary: Complete a delayed test transfer
      description: >-
        Test-key-only control for a transfer created with
        `test_scenario=delay`. It never allocates a phone or moves money and is
        forbidden with a live key. The referenced transfer must still be
        `accepted` or `queued` on first use. The reference is the natural
        idempotency key: an exact outcome replay returns the established result;
        a changed outcome returns 409 `duplicate_reference_conflict`.
      parameters:
        - $ref: '#/components/parameters/TransferReference'
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestTransferCompletionRequest'
            example:
              outcome: success
      responses:
        '200':
          $ref: '#/components/responses/TransferResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/portal/support/cases:
    get:
      tags: [Merchant support]
      operationId: listMerchantSupportCases
      summary: List the authenticated merchant's support cases
      security:
