name: telebirr-p2p

services:
  postgres:
    image: postgres:16.14-alpine3.23@sha256:42b8b8b29c8a4e933d88943e5b03001a78794905cf786e6e7634e9f2abd5a0d3
    environment:
      POSTGRES_DB: telebirr
      POSTGRES_USER: telebirr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-telebirr}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telebirr -d telebirr"]
      interval: 5s
      timeout: 3s
      retries: 20

  valkey:
    image: valkey/valkey:8.1.6-alpine@sha256:1cb6b20b70d927560cc4cc5397b5f045e74aa603ff7696274778880bb6fadc75
    command: ["valkey-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:4.2.6-management-alpine@sha256:5db3e0ab1ff589ed03b6d7fe5dcaef837b91379d8022be71a198ca63cf80a33d
    environment:
      RABBITMQ_DEFAULT_USER: telebirr
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-telebirr}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  object-storage:
    image: chrislusf/seaweedfs:4.29@sha256:d47c7ee99fcb951351d7194915f4e3a5ea604a8e8871183d713907dec4fb9bf5
    command: ["mini", "-dir=/data"]
    environment:
      AWS_ACCESS_KEY_ID: ${OBJECT_STORAGE_ACCESS_KEY:-telebirr}
      AWS_SECRET_ACCESS_KEY: ${OBJECT_STORAGE_SECRET_KEY:-change-me-development-only}
      S3_BUCKET: ${OBJECT_STORAGE_BUCKET:-telebirr-evidence}
    ports:
      # Preserve the application's existing localhost:9000 endpoint while the
      # maintained SeaweedFS S3 endpoint listens on 8333 in the container.
      - "127.0.0.1:9000:8333"
    volumes:
      - object-storage-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  mailpit:
    image: axllent/mailpit:v1.30.0@sha256:0059ef81e492a7192af3816281eed6859eb078bd7bdc58b76757c13e10e53a7d
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"

volumes:
  postgres-data:
  valkey-data:
  rabbitmq-data:
  object-storage-data:
